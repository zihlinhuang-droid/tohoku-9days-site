<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fbf8f5" />
<title>日本東北・北海道 9 天行程</title>
<style>
/* =========================================================
   東北春天旅行手帳 — Mobile First
   主色：米白、櫻花粉、霧灰粉、柔和灰藍、淡霧綠
   ========================================================= */

:root {
  --color-bg: #fbf8f5;
  --color-bg-soft: #f4ecea;
  --color-card: #ffffff;
  --color-sakura: #e8c3c6;
  --color-sakura-soft: #f6e4e5;
  --color-blue: #b9c7d2;
  --color-blue-soft: #e6ecf0;
  --color-green: #cbd6c8;
  --color-green-soft: #e6ede2;
  --color-text: #3a3538;
  --color-text-soft: #6e6669;
  --color-text-light: #9a9295;
  --color-border: #ece4e2;
  --color-accent: #b8848a;

  --shadow-card: 0 2px 10px rgba(90, 70, 75, 0.05);
  --shadow-soft: 0 6px 24px rgba(90, 70, 75, 0.08);

  --radius: 14px;
  --radius-sm: 10px;

  --max-width: 720px;
  --font-sans: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
  --font-serif: "Noto Serif TC", "Songti TC", "PMingLiU", Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.8;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

.container { max-width: var(--max-width); margin: 0 auto; padding: 0 20px; }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  padding: 72px 20px 60px;
  min-height: 56vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 0%, var(--color-sakura-soft) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 100%, var(--color-green-soft) 0%, transparent 55%),
    var(--color-bg);
}
/* 真實背景照 */
.hero__bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 0;
  /* 色溫輕微偏暖，與粉色系更契合 */
  filter: saturate(0.9);
}
/* 柔和的米白 + 櫻粉 + 霧白 漸層覆蓋，保留圖片氛圍但讓文字清楚 */
.hero__overlay {
  position: absolute; inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(255, 253, 250, 0.55) 0%, rgba(255, 253, 250, 0.25) 45%, rgba(255, 253, 250, 0) 70%),
    linear-gradient(180deg, rgba(251, 248, 245, 0.55) 0%, rgba(246, 228, 229, 0.38) 48%, rgba(251, 248, 245, 0.78) 100%);
}
/* 沒有圖片時，維持原本淡淡的點狀花瓣背景 */
.hero:not(.has-bg)::before {
  content: "";
  position: absolute; inset: 0;
  z-index: 1;
  background-image:
    radial-gradient(circle at 15% 30%, rgba(232, 195, 198, 0.22) 0, rgba(232, 195, 198, 0) 2px),
    radial-gradient(circle at 70% 60%, rgba(232, 195, 198, 0.18) 0, rgba(232, 195, 198, 0) 2px),
    radial-gradient(circle at 40% 80%, rgba(185, 199, 210, 0.18) 0, rgba(185, 199, 210, 0) 2px);
  background-size: 42px 42px, 56px 56px, 72px 72px;
  pointer-events: none;
}
.hero > .container { position: relative; z-index: 2; }
.hero__label { display: inline-block; font-size: 12px; letter-spacing: 0.32em; color: var(--color-accent); margin-bottom: 14px; }
.hero__title {
  font-family: var(--font-serif);
  font-size: clamp(1.9rem, 6.2vw, 2.7rem);
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--color-text);
  margin-bottom: 14px;
  line-height: 1.35;
  text-shadow: 0 1px 2px rgba(255, 253, 250, 0.65);
}
.hero__subtitle {
  font-size: 15px;
  color: var(--color-text-soft);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.85;
  text-shadow: 0 1px 2px rgba(255, 253, 250, 0.7);
}
.hero__meta {
  margin-top: 18px;
  font-size: 13px;
  color: var(--color-text-light);
  letter-spacing: 0.08em;
  text-shadow: 0 1px 2px rgba(255, 253, 250, 0.7);
}
.hero.has-bg .hero__subtitle { color: var(--color-text); }
.hero.has-bg .hero__meta { color: var(--color-text-soft); }

/* ---------- Day 導覽 ---------- */
.day-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(251, 248, 245, 0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid #e1d4d1;
  box-shadow: 0 1px 0 rgba(90, 70, 75, 0.04);
}
.day-nav__inner {
  display: flex; gap: 8px;
  padding: 12px 20px;
  overflow-x: auto; overflow-y: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-nav__inner::-webkit-scrollbar { display: none; }

.day-nav__btn {
  flex: 0 0 auto;
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  color: #5a5053;                       /* 比原本略深，不再 faded */
  background: #ffffff;                  /* 非 active 也給明確底色 */
  border: 1px solid #dcc9c8;            /* 粉霧邊框，比原本更清楚 */
  transition: all 0.22s ease;
  white-space: nowrap;
  letter-spacing: 0.04em;
  min-height: 40px;
  box-shadow: 0 1px 3px rgba(90, 70, 75, 0.04);
}
.day-nav__btn:hover,
.day-nav__btn:active {
  color: var(--color-accent);
  border-color: var(--color-sakura);
  background: var(--color-sakura-soft);
}
.day-nav__btn.is-active {
  color: #fff;
  background: var(--color-accent);
  border-color: var(--color-accent);
  font-weight: 600;
  box-shadow: 0 3px 10px rgba(184, 132, 138, 0.28);
  transform: translateY(-1px);
}

/* ---------- Day 大區塊 — 章節容器 ---------- */
.day {
  position: relative;
  padding: 48px 20px 56px;
}
.day:nth-child(even) { background: var(--color-bg-soft); }
.day__inner { max-width: var(--max-width); margin: 0 auto; }

/* 章節之間的微小分隔：頂端浮現一段淡淡的短線 */
.day + .day::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-sakura), transparent);
  opacity: 0.7;
}

/* ---------- Day Header — 章節開場 ---------- */
.day__header {
  position: relative;
  margin-bottom: 22px;
  padding-bottom: 20px;
}
/* header 下方小色塊短線，和下面的 module 區分開 */
.day__header::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 40px;
  height: 2px;
  background: var(--color-sakura);
  opacity: 0.65;
  border-radius: 2px;
}
.day__tag {
  display: inline-block;
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: 0.26em;
  color: var(--color-accent);
  margin-bottom: 10px;
  line-height: 1.1;
}
.day__date {
  display: block;
  font-size: 12.5px;
  color: var(--color-text-light);
  letter-spacing: 0.2em;
  margin-bottom: 12px;
}
.day__title {
  font-family: var(--font-serif);
  font-size: clamp(1.55rem, 4.8vw, 1.9rem);
  font-weight: 500;
  color: var(--color-text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.day__subtitle {
  color: var(--color-text-soft);
  font-size: 14.5px;
  line-height: 1.75;
}

/* ---------- Day Module — 把當天所有內容收進一張章節卡片 ---------- */
.day__module {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: 20px;
  padding: 14px 14px 22px;
  box-shadow: 0 2px 16px rgba(90, 70, 75, 0.05);
}
.day:nth-child(even) .day__module {
  background: var(--color-card);
  border-color: var(--color-border);
}

/* ---------- Day 大圖封面 ---------- */
.day__cover {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: var(--radius);
  overflow: hidden;
  background:
    linear-gradient(135deg, var(--color-sakura-soft) 0%, var(--color-blue-soft) 60%, var(--color-green-soft) 100%);
  box-shadow: var(--shadow-card);
  margin-bottom: 18px;
}
.day__cover img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.day__cover-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px;
  color: var(--color-text-light);
  font-size: 13px; letter-spacing: 0.18em;
}
.day__cover-placeholder::before {
  content: "✿";
  font-size: 28px;
  color: var(--color-sakura);
  opacity: 0.85;
}

/* ---------- Day 飯店連結 ---------- */
.day__hotel-wrap { margin-bottom: 22px; }
.day__hotel-link {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 15px;
  font-size: 13.5px;
  color: var(--color-text-soft);
  background: var(--color-blue-soft);
  border: 1px solid #d8e0e6;
  border-radius: 999px;
  transition: all 0.2s ease;
  min-height: 38px;
  line-height: 1.4;
}
.day__hotel-link::before { content: "🛏"; font-size: 13px; }
.day__hotel-link.is-link:hover,
.day__hotel-link.is-link:active {
  background: #d5e0e6;
  color: var(--color-text);
}
.day__hotel-link.is-link::after {
  content: "↗";
  font-size: 11px;
  color: var(--color-text-light);
  margin-left: 2px;
}

/* ---------- Day 次級分頁按鈕 — 控制面板感 ---------- */
.day-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  padding: 5px;
  background: var(--color-bg-soft);
  border: 1px solid var(--color-border);
  border-radius: 12px;
  margin-bottom: 22px;
  /* 內凹質感：像被按進 module 的控制條 */
  box-shadow: inset 0 1px 2px rgba(90, 70, 75, 0.06);
}
/* 偶數日 module 仍是白底，所以不再切換 */
.day:nth-child(even) .day-tabs { background: var(--color-bg-soft); }
.day-tab {
  padding: 11px 4px;
  border-radius: 9px;
  font-size: 14px;
  letter-spacing: 0.08em;
  color: var(--color-text-soft);
  transition: all 0.22s ease;
  min-height: 44px;
  font-weight: 500;
}
.day-tab:hover, .day-tab:active { color: var(--color-accent); }
.day-tab.is-active {
  background: var(--color-card);
  color: var(--color-accent);
  font-weight: 600;
  /* 比原本明確：浮起的卡片 + 細的 accent 環，但仍維持柔和色調 */
  box-shadow:
    0 2px 6px rgba(90, 70, 75, 0.08),
    inset 0 0 0 1px rgba(184, 132, 138, 0.3);
}

/* ---------- 分頁內容面板 ---------- */
.day-panel { animation: panelFade 0.25s ease; }
.day-panel[hidden] { display: none !important; }
@keyframes panelFade {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- 區塊標題（保留但樣式稍微簡化） ---------- */
.section-heading { display: flex; align-items: baseline; gap: 10px; margin: 4px 0 16px; }
.section-heading__num { font-family: var(--font-serif); font-size: 12px; color: var(--color-accent); letter-spacing: 0.25em; }
.section-heading__title { font-size: 15px; font-weight: 600; color: var(--color-text); letter-spacing: 0.05em; }
.section-heading__line { flex: 1; height: 1px; background: var(--color-border); }

/* ---------- 行程時間軸（雙欄：左時間 / 右內容） ---------- */
.timeline {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 0;
}
/* 貫穿時間軸的垂直引導線：落在時間欄的垂直中線上 */
.timeline::before {
  content: "";
  position: absolute;
  left: 22px;               /* 44px 時間欄的中心 */
  top: 16px;
  bottom: 16px;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, var(--color-sakura) 10%, var(--color-sakura) 90%, transparent 100%);
  opacity: 0.6;
  pointer-events: none;
}

/* 單筆行程 = 雙欄 grid；本身透明，視覺交給右側內容卡 */
.trip-card {
  position: relative;
  display: grid;
  grid-template-columns: 44px 1fr;   /* 左欄只放時間導軌，盡可能窄 */
  gap: 14px;
  align-items: stretch;
  background: transparent;
  border: 0;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
}
.trip-card:active { transform: none; }

/* 左側時間欄：垂直堆疊 → 上為圓點、下為時間標籤 */
.trip-card__time-col {
  position: relative;
  padding-top: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  text-align: center;
  min-width: 0;
}
/* 圓點：位於時間欄頂端，正好壓在垂直導引線上 */
.trip-card__time-col::before {
  content: "";
  display: block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-card);
  border: 1.5px solid var(--color-sakura);
  box-shadow: 0 0 0 3px var(--color-card);
  z-index: 1;
}

/* 右側內容欄：卡片樣式（原 .trip-card 的視覺） */
.trip-card__content {
  position: relative;
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 16px 18px 16px;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.25s ease, transform 0.25s ease;
  min-width: 0;
}
.trip-card:active .trip-card__content { transform: scale(0.995); }

/* 類型徽章：小巧、次要 */
.badge {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  padding: 2px 9px;
  border-radius: 999px;
  line-height: 1.6;
  opacity: 0.85;
}
.badge--fixed    { color: #8a6f72; background: var(--color-sakura-soft); border: 1px solid var(--color-sakura); }
.badge--optional { color: #6a7c8b; background: var(--color-blue-soft);   border: 1px solid #c9d5df; }
.badge--backup   { color: #6f8372; background: var(--color-green-soft);  border: 1px solid #c2d0bd; }

/* 徽章停駐於內容欄右上角 */
.trip-card__content .badge {
  position: absolute;
  top: 12px;
  right: 12px;
}

/* 序號 01 / 02 / 03 — 改為內嵌於右側標題前方，成為副資訊 */
.trip-card__seq {
  display: inline-block;
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--color-accent);
  opacity: 0.9;
  margin-right: 8px;
  vertical-align: 1px;
}

/* 時間 / 時段：時間欄主訊息（緊湊） */
.trip-card__time {
  display: block;
  font-family: var(--font-serif);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--color-text);
  letter-spacing: 0.02em;
  line-height: 1.35;
  white-space: nowrap;
}
.trip-card__time-col--empty .trip-card__time {
  color: var(--color-text-light);
  font-weight: 400;
  letter-spacing: 0.08em;
}

/* 地點名稱：主角；右側留白避免與徽章重疊 */
.trip-card__name {
  display: block;
  font-size: 16.5px;
  font-weight: 600;
  color: var(--color-text);
  line-height: 1.55;
  margin-top: 2px;
  padding-right: 60px;
}

/* 舊的結構樣式保留相容（新結構已不使用） */
.trip-card__head { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; margin-bottom: 10px; }
.trip-card__topline { display: none; }

/* 可點擊的地點名稱（通用） */
.place-link {
  color: var(--color-text);
  border-bottom: 1px dashed var(--color-sakura);
  padding-bottom: 1px;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.place-link:hover, .place-link:active {
  color: var(--color-accent);
  border-bottom-color: var(--color-accent);
}
.place-link::after {
  content: " ↗";
  font-size: 0.78em;
  color: var(--color-text-light);
  letter-spacing: 0;
}

.trip-card__desc { color: var(--color-text); font-size: 14.5px; margin-top: 8px; line-height: 1.85; }
.trip-card__note { font-size: 13.5px; color: var(--color-text-soft); background: #faf6f3; border-left: 3px solid var(--color-sakura); padding: 10px 14px; border-radius: var(--radius-sm); margin-top: 12px; line-height: 1.8; }
.trip-card__note::before { content: "注意事項"; display: inline-block; color: var(--color-accent); font-weight: 600; font-size: 12px; margin-right: 6px; letter-spacing: 0.05em; }

.trip-card__actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.btn-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 9px 14px; border-radius: 999px; border: 1px solid var(--color-border); background: #fff; color: var(--color-text-soft); transition: all 0.2s ease; min-height: 38px; }
.btn-chip--map:hover, .btn-chip--map:active { color: var(--color-accent); border-color: var(--color-sakura); background: var(--color-sakura-soft); }
.btn-chip--food { color: var(--color-accent); border-color: var(--color-sakura); }
.btn-chip--food:hover, .btn-chip--food:active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
.btn-chip--image { color: var(--color-accent); border-color: var(--color-sakura); background: var(--color-sakura-soft); }
.btn-chip--image:hover, .btn-chip--image:active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }

/* ---------- 補充備註 ---------- */
.extra-notes { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 16px 18px; list-style: none; box-shadow: var(--shadow-card); }
.extra-notes li { position: relative; padding-left: 18px; font-size: 14px; color: var(--color-text-soft); line-height: 1.9; margin: 8px 0; }
.extra-notes li::before { content: ""; position: absolute; left: 4px; top: 14px; width: 6px; height: 6px; border-radius: 50%; background: var(--color-sakura); }
.extra-notes--empty { color: var(--color-text-light); font-size: 13.5px; text-align: center; padding: 22px 18px; }

/* ---------- 介紹卡片 ---------- */
.intro-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.intro-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-card); }
.intro-card__img { aspect-ratio: 16 / 9; width: 100%; object-fit: cover; background: linear-gradient(135deg, var(--color-sakura-soft), var(--color-green-soft)); }
.intro-card__body { padding: 14px 16px 16px; }
.intro-card__name { font-size: 15.5px; font-weight: 600; margin-bottom: 6px; color: var(--color-text); }
.intro-card__desc { font-size: 13.5px; color: var(--color-text-soft); line-height: 1.85; white-space: pre-line; }

/* ---------- 伴手禮 ---------- */
.souvenir-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
.souvenir-item { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 14px 16px; }
.souvenir-item__name { font-size: 15px; font-weight: 600; color: var(--color-text); margin-bottom: 4px; }
.souvenir-item__desc { font-size: 13.5px; color: var(--color-text-soft); line-height: 1.85; margin-bottom: 10px; white-space: pre-line; }
.souvenir-item__map { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--color-accent); padding: 5px 11px; border: 1px solid var(--color-sakura); border-radius: 999px; min-height: 32px; }
.souvenir-item__map:hover, .souvenir-item__map:active { background: var(--color-sakura-soft); }

/* ---------- 伴手禮：哪裡買 導引 ---------- */
.souvenir-note {
  background: var(--color-sakura-soft);
  border: 1px solid var(--color-sakura);
  border-radius: var(--radius);

        image: "",
        mapLink: "https://maps.google.com/?q=鹽竈神社",
        text: "位於宮城縣鹽竈市的鹽竈神社，是東北地區最具代表性的神社之一，創建年代已不可考，但至少有千年以上歷史，自古便是掌管航海安全與漁業守護的信仰中心。主祭神為鹽土老翁神與武甕槌神等，被視為開拓與引導之神，也與附近的松島海域有深厚連結。\n\n神社坐落於小丘之上，最具象徵性的入口為長達 202 階的表參道石階。沿著石階向上，可逐步遠離城市喧囂，進入一種帶有儀式感的過渡空間；登頂後映入眼簾的是朱紅與金飾交織的社殿建築，華麗而不失莊重，為江戶時代伊達家所重建的樣貌。\n\n境內腹地廣闊，分為多個社殿區域，並保留許多古木與季節景觀。其中鹽竈神社同時也是宮城知名的賞櫻名所，境內擁有多種櫻花品種，花期較長，春季時層層櫻花與神社建築交織出極具層次的畫面。\n\n從歷史上來看，鹽竈神社不只是地方信仰，更與東北海運與鹽業發展息息相關。「鹽竈」之名據說也與製鹽傳說有關，象徵這片土地與海洋資源的緊密關係。\n\n相較於觀光性強烈的景點，鹽竈神社保有一種更接近在地日常的莊重氛圍。無論是登階參拜，或靜靜站在高處眺望港町，都能感受到這座神社長年守護海域的歷史重量。"

        text: "1. 盛岡冷麵｜來自異文化的在地經典\n盛岡冷麵起源於戰後，由來自朝鮮半島的移民將冷麵文化帶入日本，並在當地逐漸調整風味而形成今日樣貌。與韓式冷麵相比，盛岡冷麵的湯頭多為清澈帶甜的牛骨或雞骨高湯，口感溫和順口。麵條則以馬鈴薯澱粉製成，彈性強、滑順有嚼勁，是其最大特色。\n傳統配料包含水煮蛋、叉燒、黃瓜與水果（如西瓜或蘋果），在清爽中帶出微妙甜味層次。夏季尤其受歡迎，是盛岡最具代表性的料理之一。在地最具代表性的店家包括「ぴょんぴょん舎（Pyonpyonsha）」，風味穩定且分店多，初訪者首選；以及老字號「食道園」，被認為是盛岡冷麵的重要起源之一，味道更偏傳統。\n\n2. 盛岡炸醬麵｜從一碗麵延伸的在地吃法\n盛岡炸醬麵源自中國料理，經在地改良後發展出簡單卻耐吃的風格。麵條上淋上鹹香濃厚的肉味噌，搭配小黃瓜與蔥花，味道清爽中帶層次，需自行拌勻後食用。\n最具特色的是「ちいたんたん」的續碗文化——當麵吃完後，可請店家加入蛋與高湯，變成一碗溫熱的蛋花湯作結，讓整體用餐更完整。推薦店家首推「白龍（ぱいろん）」，為盛岡炸醬麵的代表名店，口味經典且吃法最道地；若想找環境較舒適的選擇，也可考慮「香醤（こうじゃん）」等店。\n\n3. 碗子蕎麥麵｜節奏感十足的傳統體驗\n碗子蕎麥麵起源於岩手地區的待客文化，是一種結合飲食與互動的體驗。服務人員會將一小碗一小碗的蕎麥麵不斷續上，客人需持續食用，直到蓋上碗蓋才算結束。\n每碗份量不多，但節奏快速，常常不知不覺就吃下數十碗。過程中可搭配山藥泥、蔥花、海苔等配料調整風味，不只是吃飯，更像一場有趣的挑戰。最具代表性的店家為「東家（あずまや）」，提供完整的體驗流程與紀錄張數，是觀光客與在地人都會造訪的老店。",

        text: "青森是日本最重要的蘋果產地，產量長年佔全國一半以上，可說是「蘋果之都」。這項產業始於明治時期，當時政府自西方引進蘋果樹苗，在氣候條件相近的東北地區試種，最終在青森扎根發展。經過百年以上的栽培與改良，如今已培育出多種品種，其中以「富士」最為人熟知。\n\n青森蘋果之所以品質穩定，與當地氣候密切相關。冬季寒冷、夏季涼爽，加上日夜溫差大，使果實能慢慢累積糖分，同時保持清爽的酸度，形成甜中帶酸、口感平衡的風味。這樣的氣候條件，也讓青森蘋果在日本市場中具有極高辨識度。\n\n在種植方式上，果農會透過細緻的修剪與疏果，控制每顆果實的養分分配；採收前還會將果實轉向陽光，使其均勻著色。這些看似細微的工序，構成了青森蘋果品質穩定的基礎，也體現出當地長年累積的農業技術。\n\n蘋果在青森不只是農產品，更深深融入日常生活。從果汁、甜點、果乾到蘋果酒，各種形式隨處可見，甚至延伸至伴手禮與設計商品。對當地人而言，蘋果既是經濟來源，也是季節變化的一部分——從開花、結果到採收，每一個階段都與生活節奏緊密相連。\n\n來到青森，品嚐蘋果不只是味覺體驗，也是一種理解這片土地氣候與人之間關係的方式。"

        text: "函館位於北海道南端，是日本最早開港的港口之一。1854 年在開國背景下成為對外通商港，之後西洋文化、教會建築與外國商館陸續進入，也形塑了今日函館山麓一帶和洋並存的城市風景。\n\n函館最具代表性的歷史地標之一是五稜郭。這座仿歐洲要塞設計而成的星形城郭，約於 19 世紀中期興建，目的在於因應開港後的防衛需求；後來也成為幕末箱館戰爭的重要舞台。如今從五稜郭塔俯瞰，仍能清楚看見其完整星形輪廓。\n\n相較於單純的觀光城市，函館更像一座帶有明確歷史層次的港町。港邊的紅磚倉庫、函館朝市的海鮮、坡道與夜景，共同構成這座城市最鮮明的印象。若說札幌展現的是北海道的都市感，那麼函館更像是北海道與世界相遇時留下來的舊時代入口。"

      {
        title: "函館朝市｜車站旁就能感受港町早晨的海鮮市場",

        text: "函館朝市位於 JR 函館站旁，步行約 1 分鐘可達，是函館最具代表性的市場之一。它的起源可追溯至戰後初期，之後逐步發展成今日的大型市場；現在整個朝市區域約有 250 間店舖，而其中聚集海鮮食堂的「丼飯橫丁市場」則有約 20 間店家，是第一次造訪時最容易安排的一區。\n\n函館朝市最有名的，是可以直接吃到北海道近海海鮮的鮮度與臨場感。若想體驗函館代表性的活烏賊，可到站二市場的「元祖 活いか釣り堀」，現場釣起後就能請店家處理成生魚片，這也是函館朝市最具代表性的吃法之一。\n\n若是想坐下來吃一碗完整的海鮮丼，丼飯橫丁裡可以優先考慮幾間代表店。像是「一花亭たびじ」、「えびす」、「いくら亭」都是目前丼飯橫丁官方列出的在營店家，位置集中、安排方便，適合第一次進朝市時直接挑一間入座。若喜歡壽司，也可以考慮「鮨処 はこだて」；如果同行者有人不吃生食，橫丁內也有食堂型店家可選擇熟食與定食。\n\n與一般觀光市場相比，函館朝市真正吸引人的地方，在於它仍保有港町日常的底色。你可以一早先去看活烏賊、再進丼飯橫丁吃海鮮丼，最後買點水果或乾貨離開。這裡不只是「吃海鮮的地方」，更像是函館依海而生的生活節奏，被濃縮在車站前的一個早晨裡。",

/* ===========================================================
   【四、以下是渲染邏輯】
   只想改內容 → 改上面的 itineraryData；不想改排版不必動這段。
   =========================================================== */

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

/* 包裝：若有 mapLink，把任何文字變成 Google Maps 連結 */
function wrapPlaceLink(text, mapLink, extraClass) {
  const safeText = escapeHTML(text || "");
  if (!mapLink) return safeText;
  return `<a class="place-link ${extraClass || ""}" href="${escapeHTML(mapLink)}" target="_blank" rel="noopener">${safeText}</a>`;
}

/* 類型對照表 */
const TYPE_LABEL = { fixed: "固定", optional: "彈性", backup: "備案" };
const TYPE_CLASS = { fixed: "badge--fixed", optional: "badge--optional", backup: "badge--backup" };

function renderHero() {
  document.getElementById("heroLabel").textContent    = heroData.label;
  document.getElementById("heroTitle").textContent    = heroData.title;
  document.getElementById("heroSubtitle").textContent = heroData.subtitle;
  document.getElementById("heroMeta").textContent     = heroData.meta;
  document.getElementById("siteFooter").textContent   = footerText;

  /* 背景圖：有圖片才套用，否則使用預設柔和漸層 */
  const heroEl = document.getElementById("hero");
  const heroBgEl = document.getElementById("heroBg");
  if (heroData.backgroundImage) {
    heroBgEl.style.backgroundImage = `url("${heroData.backgroundImage}")`;
    heroBgEl.setAttribute("role", "img");
    heroBgEl.setAttribute("aria-label", heroData.backgroundAlt || "");
    heroEl.classList.add("has-bg");
  } else {
    heroBgEl.style.backgroundImage = "";
    heroEl.classList.remove("has-bg");
  }
}

function renderDayNav() {
  const inner = document.getElementById("dayNavInner");
  inner.innerHTML = itineraryData.map((d, i) =>
    `<button class="day-nav__btn" data-target="day${i+1}">${escapeHTML(d.day)}</button>`
  ).join("");
}

/* ---------- Day Cover ---------- */
function renderDayCover(day) {
  if (day.coverImage) {
    return `
      <div class="day__cover">
        <img src="${escapeHTML(day.coverImage)}" alt="${escapeHTML(day.coverAlt || day.title || "")}" loading="lazy" />
      </div>
    `;
  }
  return `
    <div class="day__cover">
      <div class="day__cover-placeholder">
        <span>${escapeHTML(day.coverAlt || day.title || "COVER IMAGE")}</span>
      </div>
    </div>
  `;
}

/* ---------- Day Hotel ---------- */
function renderDayHotel(hotel) {
  if (!hotel || !hotel.name) return "";
  if (hotel.mapLink) {
    return `
      <div class="day__hotel-wrap">
        <a class="day__hotel-link is-link" href="${escapeHTML(hotel.mapLink)}" target="_blank" rel="noopener">
          ${escapeHTML(hotel.name)}
        </a>
      </div>
    `;
  }
  return `
    <div class="day__hotel-wrap">
      <span class="day__hotel-link">${escapeHTML(hotel.name)}</span>
    </div>
  `;
}

/* ---------- Day Tabs ---------- */
function renderDayTabs(idx) {
  const tabs = [
    { key: "schedule", label: "行程" },
    { key: "intro",    label: "介紹" },
    { key: "souvenir", label: "伴手禮" },
    { key: "notes",    label: "備註" },
  ];
  return `
    <div class="day-tabs" role="tablist" aria-label="Day ${idx} 子分頁">
      ${tabs.map((t, i) => `
        <button class="day-tab ${i === 0 ? "is-active" : ""}"
                data-tab="${t.key}"
                role="tab"
                aria-selected="${i === 0 ? "true" : "false"}">
          ${t.label}
        </button>
      `).join("")}
    </div>
  `;
}

/* ---------- Day Panels ---------- */
function renderDayPanels(day) {
  const scheduleHTML = `
    <div class="day-panel" data-panel="schedule">
      <div class="timeline">
        ${(day.schedule || []).map(renderTripCard).join("")}
      </div>
    </div>
  `;

  const introHTML = `
    <div class="day-panel" data-panel="intro" hidden>
      <div class="intro-grid">
        ${(day.introCards || []).map(renderIntroCard).join("")}
      </div>
    </div>
  `;

  const souvenirNoteHTML = day.souvenirNote
    ? `<div class="souvenir-note">
         <span class="souvenir-note__label">WHERE TO BUY</span>
         ${applyInlineLinks(escapeHTML(day.souvenirNote), day.souvenirNoteLinks)}
       </div>`
    : "";

  const souvenirHTML = `
    <div class="day-panel" data-panel="souvenir" hidden>
      ${souvenirNoteHTML}
      <div class="souvenir-list">
        ${(day.souvenirs || []).map(renderSouvenir).join("")}
      </div>
    </div>
  `;

  const notesInner = (day.extraNotes && day.extraNotes.length)
    ? `<ul class="extra-notes">
         ${day.extraNotes.map(n => `<li>${escapeHTML(n)}</li>`).join("")}
       </ul>`
    : `<div class="extra-notes extra-notes--empty">（尚無備註）</div>`;

  const notesHTML = `
    <div class="day-panel" data-panel="notes" hidden>
      ${notesInner}
    </div>
  `;

  return scheduleHTML + introHTML + souvenirHTML + notesHTML;
}

/* ---------- Render Days ---------- */
function renderDays() {
  const container = document.getElementById("daysContainer");
  container.innerHTML = itineraryData.map((day, i) => {
    const idx = i + 1;
    return `
      <section class="day" id="day${idx}">
        <div class="day__inner">
          <header class="day__header">
            <span class="day__tag">DAY ${String(idx).padStart(2,"0")}</span>
            <span class="day__date">${escapeHTML(day.date || "")}</span>
            <h2 class="day__title">${escapeHTML(day.title || "")}</h2>
            <p class="day__subtitle">${escapeHTML(day.subtitle || "")}</p>
          </header>

          <div class="day__module">
            ${renderDayCover(day)}
            ${renderDayHotel(day.hotel)}
            ${renderDayTabs(idx)}
            ${renderDayPanels(day)}
          </div>
        </div>
      </section>
    `;
  }).join("");
}

/* ---------- Trip Card ---------- */
function renderTripCard(item, idx) {
  const typeKey = item.type || "fixed";
  const badge = `<span class="badge ${TYPE_CLASS[typeKey] || TYPE_CLASS.fixed}">${TYPE_LABEL[typeKey] || "固定"}</span>`;
  const seq = String((idx || 0) + 1).padStart(2, "0");

  // 左側時間欄：若有明確時間就顯示時間；若沒有則以「—」淡色占位，
  // 提示使用者此筆尚未設定時段（可在資料中改為「早上 / 中餐 / 下午 / 晚餐 / 抵達後」等相對標籤）
  const rawTime = (item.time || "").trim();
  const hasTime = rawTime.length > 0;
  const timeColClass = hasTime
    ? "trip-card__time-col"
    : "trip-card__time-col trip-card__time-col--empty";
  const timeDisplay = hasTime ? escapeHTML(rawTime) : "—";

  const foodsJson = JSON.stringify(item.foods || []);

  /* 地點名稱本身也能點擊開 Google Maps */
  const placeHTML = item.mapLink
    ? `<a class="place-link" href="${escapeHTML(item.mapLink)}" target="_blank" rel="noopener">${escapeHTML(item.place)}</a>`
    : escapeHTML(item.place);

  const mapBtn = item.mapLink
    ? `<a class="btn-chip btn-chip--map" href="${escapeHTML(item.mapLink)}" target="_blank" rel="noopener">📍 Google Maps</a>`
    : "";
  const foodBtn = (item.foods && item.foods.length)
    ? `<button class="btn-chip btn-chip--food"
         data-food='${escapeHTML(foodsJson)}'
         data-food-title="${escapeHTML(item.place)} · 附近吃食">
         🍜 附近吃食
       </button>`
    : "";
  /* 圖片按鈕：點擊後以 modal 顯示單張大圖（例：館內地圖、公園地圖） */
  const imageBtns = (Array.isArray(item.images) && item.images.length)
    ? item.images
        .filter(img => img && img.src && img.label)
        .map(img => `<button class="btn-chip btn-chip--image"
             data-image-src="${escapeHTML(img.src)}"
             data-image-title="${escapeHTML(img.label)}">
             🗺️ ${escapeHTML(img.label)}
           </button>`).join("")
    : "";

  /*
    雙欄時間軸結構：
      左側 = 時間欄 (只顯示時間／時段)
      右側 = 內容卡 (序號 + 地點 / 描述 / 注意事項 / 行動按鈕；徽章絕對定位於右上)
  */
  return `
    <article class="trip-card">
      <div class="${timeColClass}">
        <span class="trip-card__time">${timeDisplay}</span>
      </div>
      <div class="trip-card__content">
        ${badge}
        <h4 class="trip-card__name"><span class="trip-card__seq">${seq}</span>${placeHTML}</h4>
        ${item.description ? `<p class="trip-card__desc">${applyInlineLinks(escapeHTML(item.description), item.descriptionLinks)}</p>` : ""}
        ${item.note ? `<p class="trip-card__note">${applyInlineLinks(escapeHTML(item.note), item.noteLinks)}</p>` : ""}
        ${(mapBtn || foodBtn || imageBtns) ? `<div class="trip-card__actions">${mapBtn}${foodBtn}${imageBtns}</div>` : ""}
      </div>
    </article>
  `;
}

/* ---------- Helper：將已 escapeHTML 的文字中指定名稱轉換成 place-link ---------- */
function applyInlineLinks(escapedText, links) {
  if (!Array.isArray(links) || !links.length) return escapedText;
  const sorted = [...links]
    .filter(l => l && l.name && l.url)
    .sort((a, b) => b.name.length - a.name.length);
  const tokens = [];
  let out = escapedText;
  sorted.forEach((link, i) => {
    const safeName = escapeHTML(link.name);
    if (out.indexOf(safeName) !== -1) {
      const token = `\u0000LINK_${i}\u0000`;
      const anchor = `<a class="place-link" href="${escapeHTML(link.url)}" target="_blank" rel="noopener">${safeName}</a>`;
      out = out.split(safeName).join(token);
      tokens.push({ token, anchor });
    }
  });
  tokens.forEach(({ token, anchor }) => {
    out = out.split(token).join(anchor);
  });
  return out;
}

/* ---------- Intro Card ---------- */
function renderIntroCard(card) {
  const imgTag = card.image
    ? `<img class="intro-card__img" src="${escapeHTML(card.image)}" alt="${escapeHTML(card.title)}" loading="lazy" />`
    : `<div class="intro-card__img"></div>`;

  const titleHTML = card.mapLink
    ? `<a class="place-link" href="${escapeHTML(card.mapLink)}" target="_blank" rel="noopener">${escapeHTML(card.title)}</a>`
    : escapeHTML(card.title);

  const descHTML = applyInlineLinks(escapeHTML(card.text || ""), card.links);

  return `
    <article class="intro-card">
      ${imgTag}
      <div class="intro-card__body">
        <h4 class="intro-card__name">${titleHTML}</h4>
        <p class="intro-card__desc">${descHTML}</p>
      </div>
    </article>
  `;
}

/* ---------- Souvenir ---------- */
function renderSouvenir(s) {
  const nameHTML = s.mapLink
    ? `<a class="place-link" href="${escapeHTML(s.mapLink)}" target="_blank" rel="noopener">${escapeHTML(s.name)}</a>`
    : escapeHTML(s.name);

  return `
    <div class="souvenir-item">
      <div class="souvenir-item__name">${nameHTML}</div>
      <div class="souvenir-item__desc">${applyInlineLinks(escapeHTML(s.description || ""), s.descriptionLinks)}</div>
      ${s.mapLink
        ? `<a class="souvenir-item__map" href="${escapeHTML(s.mapLink)}" target="_blank" rel="noopener">Google Maps</a>`
        : ""}
    </div>
  `;
}

/* ---------- Day 頂部 pill 導覽 ---------- */
function bindDayNav() {
  const navEl = document.getElementById("dayNav");
  const navInner = document.getElementById("dayNavInner");
  const btns = document.querySelectorAll(".day-nav__btn");

  btns.forEach(btn => {
    btn.addEventListener("click", () => {
      const target = document.getElementById(btn.dataset.target);
      if (!target) return;
      const y = target.getBoundingClientRect().top + window.pageYOffset - navEl.offsetHeight + 1;
      window.scrollTo({ top: y, behavior: "smooth" });
    });
  });

  const dayIds = Array.from(btns).map(b => b.dataset.target);
  function updateActive() {
    const scrollY = window.scrollY + navEl.offsetHeight + 20;
    let current = dayIds[0];
    dayIds.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.offsetTop <= scrollY) current = id;
    });
    btns.forEach(b => {
      const isActive = b.dataset.target === current;
      b.classList.toggle("is-active", isActive);
      if (isActive) {
        const btnLeft = b.offsetLeft;
        const btnRight = btnLeft + b.offsetWidth;
        const viewLeft = navInner.scrollLeft;
        const viewRight = viewLeft + navInner.clientWidth;
        if (btnLeft < viewLeft + 12) navInner.scrollTo({ left: btnLeft - 12, behavior: "smooth" });
        else if (btnRight > viewRight - 12) navInner.scrollTo({ left: btnRight - navInner.clientWidth + 12, behavior: "smooth" });
      }
    });
  }
  window.addEventListener("scroll", updateActive, { passive: true });
  updateActive();
}

/* ---------- Day 內部次級分頁 ---------- */
function bindDayTabs() {
  document.querySelectorAll(".day").forEach(daySection => {
    const tabs   = daySection.querySelectorAll(".day-tab");
    const panels = daySection.querySelectorAll(".day-panel");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;

        tabs.forEach(t => {
          const active = t === tab;
          t.classList.toggle("is-active", active);
          t.setAttribute("aria-selected", active ? "true" : "false");
        });

        panels.forEach(p => {
          if (p.dataset.panel === target) p.removeAttribute("hidden");
          else p.setAttribute("hidden", "");
        });
      });
    });
  });
}

/* ---------- 附近吃食 Modal ---------- */
function bindModal() {
  const modal = document.getElementById("foodModal");
  const titleEl = document.getElementById("foodModalTitle");
  const listEl = document.getElementById("foodModalList");

  /* 用事件委派：即便按鈕藏在 hidden 分頁中也能觸發 */
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".btn-chip--food");
    if (!btn) return;

    const title = btn.dataset.foodTitle || "附近吃食";
    let items = [];
    try { items = JSON.parse(btn.dataset.food || "[]"); }
    catch (err) { console.error("food JSON parse error:", err); }

    titleEl.textContent = title;
    listEl.innerHTML = items.length
      ? items.map(item => {
          const nameHTML = item.mapLink
            ? `<a class="modal__item-name-link" href="${escapeHTML(item.mapLink)}" target="_blank" rel="noopener">${escapeHTML(item.name || "")}</a>`
            : escapeHTML(item.name || "");
          return `
            <li class="modal__item">
              <div class="modal__item-head">
                <span class="modal__item-name">${nameHTML}</span>
                ${item.mapLink ? `<a class="modal__item-map" href="${escapeHTML(item.mapLink)}" target="_blank" rel="noopener">Google Maps</a>` : ""}
              </div>
              ${item.info ? `<div class="modal__item-desc">${escapeHTML(item.info)}</div>` : ""}
            </li>
          `;
        }).join("")
      : `<li class="modal__item"><div class="modal__item-desc" style="color:var(--color-text-light)">尚無資料，可於 itineraryData 對應景點的 foods 陣列新增。</div></li>`;

    modal.classList.add("is-open");
    document.body.style.overflow = "hidden";
  });

  modal.querySelectorAll("[data-modal-close]").forEach(el => {
    el.addEventListener("click", closeModal);
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && modal.classList.contains("is-open")) closeModal();
  });
  function closeModal() {
    modal.classList.remove("is-open");
    document.body.style.overflow = "";
  }

  /* ---------- 圖片 Modal：館內地圖 / 公園地圖 ---------- */
  const imageModal = document.getElementById("imageModal");
  const imageTitleEl = document.getElementById("imageModalTitle");
  const imageImgEl = document.getElementById("imageModalImg");

  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".btn-chip--image");
    if (!btn) return;
    const src = btn.dataset.imageSrc || "";
    const title = btn.dataset.imageTitle || "地圖";
    imageTitleEl.textContent = title;
    imageImgEl.src = src;
    imageImgEl.alt = title;
    imageModal.classList.add("is-open");
    document.body.style.overflow = "hidden";
  });

  imageModal.querySelectorAll("[data-modal-close]").forEach(el => {
    el.addEventListener("click", closeImageModal);
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && imageModal.classList.contains("is-open")) closeImageModal();
  });
  function closeImageModal() {
    imageModal.classList.remove("is-open");
    document.body.style.overflow = "";
    /* 清空 src 避免下一張圖開啟時還短暫顯示上一張 */
    imageImgEl.src = "";
  }
}

function init() {
  renderHero();
  renderDayNav();
  renderDays();
  bindDayNav();
  bindDayTabs();
  bindModal();
}
document.addEventListener("DOMContentLoaded", init);
</script>
